baseURL = 'https://cogitocommunity.github.io/'
languageCode = 'en-us'
title = 'CogitoCommunity'
theme = 'PaperMod'
googleAnalytics = "G-299ZRXC3F2"

[params]
  sticky = true
  ShowSearchPage = true
  ShowToc = true
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowPostNavLinks = true

  # Enable search
  ShowShareButtons = true

  # Homepage Settings
  [params.profileMode]
    enabled = false
    title = "CogitoCommunity"
    subtitle = "Bilingual student publication fostering intellectual discourse through Biology, Philosophy, and Public Speaking"

    [[params.profileMode.buttons]]
      name = "Read Articles"
      url = "/articles/"

    [[params.profileMode.buttons]]
      name = "Submit Article"
      url = "/submit/"

  [[params.socialIcons]]
    name = "Instagram"
    url = "https://www.instagram.com/cogitocommunity/"

  [params.share]
    allowedPlatforms = ["instagram"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Main Menu (top navigation)
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Articles"
  url = "/articles/"
  weight = 2

[[menu.main]]
  name = "Clubs"
  url = "/clubs/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

[[menu.main]]
  name = "Submit"
  url = "/submit/"
  weight = 5

[[menu.main]]
  name = "Search"
  url = "/search/"
  weight = 6

# Taxonomies (categories and tags)
[taxonomies]
  category = "categories"
  tag = "tags"
  club = "clubs"

# Markup configuration (for better code highlighting)
[markup]
  [markup.highlight]
    style = 'monokai'